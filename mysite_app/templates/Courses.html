<!DOCTYPE html>
<html lang="sw">
<head>

<title>Matokeo ya Masomo</title>

<style>

body{
    font-family: Arial, sans-serif;
    background:#f4f4f4;
    padding:40px;
}

/* CONTAINER */
.table-container{
    display: flex;
    flex-direction: column;
    width:700px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:12px;
    box-shadow:0 4px 15px rgba(0,0,0,0.1);
}

/* TITLE */
h2{
    text-align:center;
    margin-bottom:20px;
    color:#222;
}

/* TABLE */
table{
    width:100%;
    border-collapse:collapse;
}

/* HEADER */
thead{
    background:#3B7BF6;
    color:white;
}

th{
    padding:14px;
    text-align:left;
    font-size:14px;
}

/* BODY */
td{
    padding:14px;
    border-bottom:1px solid #ddd;
    color:#333;
    font-weight: bold;

}

/* ROW HOVER */
tbody tr:hover{
    background:#f1f5ff;
}

/* POINT STYLE */
.point{
    font-weight:bold;
    color:green;
}
footer{
    font-weight: bold;
    text-align: center;
    border: #333;
    padding: 20px;
    background-color: white;
    margin: 50px;
   
}

</style>
</head>
