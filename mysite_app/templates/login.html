
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #1a1a2e;
    font-family: 'Segoe UI', sans-serif;
  }

  .box {
    perspective: 1000px;
  }

  .login {
    background: #16213e;
    border-radius: 20px;
    padding: 10px;
    box-shadow:
      0 0 0 2px #0f3460,
      0 0 40px rgba(233, 30, 140, 0.3),
      0 0 80px rgba(233, 30, 140, 0.1);
    animation: fadeIn 0.8s ease forwards;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(30px) rotateX(10deg); }
    to   { opacity: 1; transform: translateY(0) rotateX(0deg); }
  }

  /* Glow top bar */
  .login::before {
    content: '';
    display: block;
    height: 3px;
    background: linear-gradient(90deg, transparent, #e91e8c, #00d4ff, transparent);
    border-radius: 3px;
    margin-bottom: 8px;
    animation: glowBar 3s linear infinite;
  }

  /* Glow bottom bar */
  .login::after {
    content: '';
    display: block;
    height: 3px;
    background: linear-gradient(90deg, transparent, #00d4ff, #e91e8c, transparent);
    border-radius: 3px;
    margin-top: 8px;
    animation: glowBar 3s linear infinite reverse;
  }

  @keyframes glowBar {
    0%   { background-position: -200px; opacity: 0.6; }
    50%  { opacity: 1; }
    100% { background-position: 200px; opacity: 0.6; }
  }

  .loginBx {
    background: #0d1b2a;
    border-radius: 14px;
    padding: 40px 36px;
    width: 320px;
    border: 1px solid rgba(233, 30, 140, 0.15);
  }

  h2 {
    color: white;
    font-size: 22px;
    font-weight: 700;
    text-align: center;
    margin-bottom: 32px;
    letter-spacing: 3px;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }

  h2 i:first-child { color: #e91e8c; font-size: 18px; }
  h2 i:last-child  { color: #e91e8c; font-size: 16px; animation: pulse 1.5s ease-in-out infinite; }

  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 1; }
    50%       { transform: scale(1.3); opacity: 0.7; }
  }

  input[type="text"],
  input[type="password"] {
    width: 100%;
    padding: 12px 16px;
    margin-bottom: 16px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px;
    color: white;
    font-size: 14px;
    outline: none;
    transition: all 0.3s;
  }

  input[type="text"]::placeholder,
  input[type="password"]::placeholder {
    color: rgba(255,255,255,0.35);
  }

  input[type="text"]:focus,
  input[type="password"]:focus {
    border-color: #e91e8c;
    background: rgba(233, 30, 140, 0.05);
    box-shadow: 0 0 12px rgba(233, 30, 140, 0.25);
  }

  input[type="submit"] {
    width: 100%;
    padding: 13px;
    background: linear-gradient(135deg, #00d4ff, #e91e8c);
    border: none;
    border-radius: 8px;
    color: white;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 1px;
    cursor: pointer;
    margin-bottom: 20px;
    transition: all 0.3s;
    box-shadow: 0 4px 20px rgba(233, 30, 140, 0.35);
  }

  input[type="submit"]:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(233, 30, 140, 0.5);
  }

  input[type="submit"]:active {
    transform: translateY(0);
  }

  .group {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .group a {
    text-decoration: none;
    font-size: 13px;
    color: rgba(255,255,255,0.45);
    transition: color 0.2s;
  }

  .group a:last-child { color: #e91e8c; }
  .group a:hover { color: white; }
  .group a:last-child:hover { color: #ff4db8; }
</style>
</head>
<body>
    <form method="POST">

    {% csrf_token %}

<div class="box">
  <div class="login">
    <div class="loginBx">
      <h2>
        <i class="fa-solid fa-right-to-bracket"></i>
        LOGIN
        <i class="fa-solid fa-heart"></i>
      </h2>

      <input type="text" placeholder="@Username">
      <input type="password" placeholder="Password">
      <input type="submit" value="Sign in">

      <div class="group">
        <p>{{ error }}</p>
        <a href="#">Forgot Password</a>
        <a href="{% url 'signup' %}">Sign up</a>
    </form>
      </div>
    </div>
  </div>
</div>

</body>
</html>
