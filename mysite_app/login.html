<!DOCTYPE html>
<html lang="en" >
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link rel="icon" type="image/x-icon" href="pictures/logo.png">
	<link href="css/bootstrap.min.css" rel="stylesheet">
	<script src="js/bootstrap.bundle.main.js"></script>
	<title>Log In</title>
</head>
<style>
   .login-box{
   	display: flex;
   	justify-content: center;
   	align-items: center;
   	flex-direction:column;
   	height: 100vh;

   	.form-group{
   		margin-bottom:15px ;

   	}

   	label{
   		display: block;
   		margin-bottom: 5px;
   	}

   	input{
   		width: 100%;
   		padding: 10px;
   	}
   }
   .logo{
   	  width: 100px;
   	  height: auto;
   	  display: block;
   	  margin: 0 auto 10px;
   	  

   }
    .login{
    	width: 100%;
    	max-width: 400px;
    	margin: auto;
      padding: 50px;
    	border: 1px solid black;
    	background-color:rgba(255, 255, 255, 0.8);
    	box-shadow: 1px 4px 4px black;
    	border-radius: 20px;
    }
    .login-btn{
    	display: flex;
    	justify-content: space-between;
    	align-items: center;
    }
    body{
    	background-image: url(pictures/slider.png);
    	background-attachment: fixed;
    	background-size: cover;
    } 

    a{
    	color: green;
    	text-decoration: none;
    }

    a:hover{
    	color: red;
    }
    button{
    	background-color: green;
    	width: 20%;
    	color: black;
    	cursor: pointer;
    	transition: 0.3s;
    	border-radius: 8px;
    }
    button:hover{
    	background-color: ghostwhite;
    }	

</style>
<body>
     <div class="container-fluid">
     	<div class="login-box">
     		<div class="top">
     			<center>
     				<img src="pictures/logo.png" alt="waiting...">
     			</center>
     		</div>
     		<div class="login">
     		
     		<div class="body">
     			<form action="">
     				<div class="form-group">
     				<label>username</label>
     				<input type="text" class="form-control">
     			
     				</div>
     				<div class="form-group">
     				<label>password</label>
     				<input type="password" class="form-control">
     				</div>
     				<div class="login-btn mt-2">
     				    <div class="remember">
     				    	<input type="checkbox">Remember me 
     				    </div>
     				    <button  class="btn btn-success">Log In</button>


     			</form>
     			
     		</div>
     		<div class="bottom">
     			<a href="#">forget password?</a>
     			
     		</div>
     	</div>
     </div>
    </di>
</body>
</html>
